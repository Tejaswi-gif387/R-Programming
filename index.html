<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrs. D. Tejaswi — Assistant Professor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: #f0f4f8;
            color: #333;
            min-height: 100vh;
        }

        /* ── Hero Banner ── */
        .hero {
            background: linear-gradient(135deg, #1a2a4a 0%, #2980b9 100%);
            color: #fff;
            padding: 50px 40px 40px;
            display: flex;
            align-items: center;
            gap: 36px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 280px; height: 280px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -80px; left: 30%;
            width: 200px; height: 200px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }

        .profile-photo {
            width: 120px;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            border: 4px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .hero-info { position: relative; z-index: 1; }
        .hero-info h1 {
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .hero-info .designation {
            font-size: 1.05em;
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 4px;
        }
        .hero-info .institution {
            font-size: 0.95em;
            opacity: 0.75;
        }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 3px 14px;
            font-size: 0.78em;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        /* ── Main Content ── */
        .container {
            max-width: 860px;
            margin: 36px auto;
            padding: 0 24px 60px;
        }

        /* ── Section Title ── */
        .section-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #1a2a4a;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(to right, #2980b9, transparent);
            border-radius: 2px;
        }

        /* ── Skills Card ── */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            padding: 24px 28px;
            margin-bottom: 28px;
        }

        .skills-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .skill-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #e8f4fd, #d0eaff);
            color: #1a6fa0;
            border: 1px solid #b3d9f5;
            border-radius: 24px;
            padding: 8px 20px;
            font-size: 0.92em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .skill-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(41,128,185,0.2);
        }
        .skill-icon { font-size: 1.1em; }

        /* ── Courses Table ── */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
        }
        thead tr {
            background: linear-gradient(135deg, #1a2a4a, #2980b9);
            color: #fff;
        }
        th {
            padding: 14px 18px;
            text-align: left;
            font-weight: 600;
            font-size: 0.88em;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        th:first-child { border-radius: 8px 0 0 0; width: 70px; }
        th:last-child  { border-radius: 0 8px 0 0; }

        tbody tr {
            border-bottom: 1px solid #eef2f7;
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f0f7ff; }

        td {
            padding: 14px 18px;
            font-size: 0.95em;
            color: #444;
        }
        td:first-child {
            color: #999;
            font-weight: 600;
            font-size: 0.85em;
        }

        .course-link {
            color: #2980b9;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .course-link::after {
            content: '→';
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 0.2s, transform 0.2s;
        }
        tbody tr:hover .course-link { color: #1a6fa0; }
        tbody tr:hover .course-link::after {
            opacity: 1;
            transform: translateX(0);
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8em;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="hero">
        <img src="Passport Photo.jpg" alt="Profile Photo" class="profile-photo">
        <div class="hero-info">
            <h1>Mrs. D. Tejaswi</h1>
            <p class="designation">Assistant Professor</p>
            <p class="institution">ANITS &nbsp;·&nbsp; Visakhapatnam</p>
            <span class="badge">Computer Science &amp; Engineering</span>
        </div>
    </div>

    <div class="container">

        <div class="card">
            <div class="section-title">Skills</div>
            <div class="skills-grid">
                <div class="skill-tag"><span class="skill-icon">📊</span> R</div>
                <div class="skill-tag"><span class="skill-icon">🐍</span> Python</div>
                <div class="skill-tag"><span class="skill-icon">☕</span> Java</div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">Courses</div>
            <table>
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Course Name</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>01</td>
                        <td><a href="sample.html" class="course-link">R Programming</a></td>
                    </tr>
                    <tr>
                        <td>02</td>
                        <td><a href="Co.html" class="course-link">Computer Organization</a></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <footer>© 2026 Mrs. D. Tejaswi · ANITS, Visakhapatnam</footer>

</body>
</html>
